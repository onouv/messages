name: messaging 
services:
  db:
    image: postgres:17
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: ${DB_HOST}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - server-net
    ports:
      - 5432:5432
    volumes:
      - ../db-data:/var/lib/postgresql/data
networks:
  server-net: {}
